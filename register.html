<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus — Create Account</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .strength-bar { display: flex; gap: 4px; margin-top: 7px; }
    .s-seg { flex: 1; height: 3px; background: var(--border-default); border-radius: 2px; }
    .s-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card wide">

    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      </div>
      <span class="logo-name">Nexus</span>
    </div>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Join thousands already chatting on Nexus.</p>

    <a href="#" class="btn-github">
      <svg viewBox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      Sign up with GitHub
    </a>

    <div class="divider">or register with email</div>

    <form action="home.html" method="get">

      <!-- Avatar picker (CSS-only radio) -->


      <div class="form-group">
        <label class="form-label" for="username">Username <span class="req">*</span></label>
        <input type="text" class="form-input" id="username" name="username" placeholder="adalovelace" required autocomplete="username" pattern="[a-zA-Z0-9_]{3,20}" />
        <p class="form-hint">3–20 characters. Letters, numbers, underscores.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email address <span class="req">*</span></label>
        <input type="email" class="form-input" id="email" name="email" placeholder="ada@example.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="req">*</span></label>
        <input type="password" class="form-input" id="password" name="password" placeholder="Minimum 8 characters" required minlength="8" autocomplete="new-password" />
        <div class="strength-bar">
          <div class="s-seg"></div>
          <div class="s-seg"></div>
          <div class="s-seg"></div>
          <div class="s-seg"></div>
        </div>
        <p class="s-hint">Use uppercase, numbers &amp; symbols for a stronger password.</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirm password <span class="req">*</span></label>
        <input type="password" class="form-input" id="confirm" name="confirm" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
      </div>

      <div class="check-row">
        <input type="checkbox" id="tos" name="tos" required />
        <label for="tos">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
          I confirm I am at least 13 years old.
        </label>
      </div>


      <button type="submit" class="btn btn-green btn-full">Create account →</button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

  </div>
</div>

</body>
</html>
